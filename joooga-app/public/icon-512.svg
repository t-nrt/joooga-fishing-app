    <path d="M70 400 Q120 380 170 400 T270 400 Q320 380 370 400 T470 400"
          stroke="white" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M20 440 Q70 420 120 440 T220 440 Q270 420 320 440 T420 440"
          stroke="white" stroke-width="4" fill="none" opacity="0.4"/>
  </g>

  <!-- アプリ名（大きめ） -->
  <text x="256" y="100" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif" font-size="48" font-weight="bold">Joooga</text>
  <text x="256" y="140" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif" font-size="20" opacity="0.9">フカセ釣りアプリ</text>
</svg>