<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#3b82f6"/>
  <g fill="white">
    <!-- 魚のシルエット（大きめ） -->
    <ellipse cx="256" cy="240" rx="120" ry="60" fill="white"/>
    <circle cx="200" cy="220" r="8" fill="#3b82f6"/>
    <!-- 尾びれ -->
    <path d="M136 240 L100 220 L100 260 Z" fill="white"/>
    <!-- 背びれ -->
    <path d="M200 180 Q230 160 260 180 Q230 200 200 180" fill="white"/>
    <!-- 腹びれ -->
    <path d="M200 300 Q230 320 260 300 Q230 280 200 300" fill="white"/>

    <!-- 波のライン（複数層） -->
    <path d="M50 320 Q100 300 150 320 T250 320 Q300 300 350 320 T450 320"
